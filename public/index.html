
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4Fun - Agendamento</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">
<main class="w-full max-w-lg">

<div id="form-container" class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
    <header class="text-center mb-8">
        <h1 class="text-3xl font-bold text-blue-400">4Fun Estética Automotiva</h1>
        <p class="text-slate-400 mt-2">Agende seu serviço.</p>
    </header>

    <form id="appointment-form" class="space-y-6">
        <div>
            <label for="name" class="block mb-1">Seu Nome</label>
            <input type="text" id="name" name="name" required placeholder="João Silva" class="w-full px-4 py-3 bg-slate-700 rounded-lg text-white">
        </div>
        <div>
            <label for="car-model" class="block mb-1">Modelo do Carro</label>
            <input type="text" id="car-model" name="car-model" required placeholder="Honda Civic 2022" class="w-full px-4 py-3 bg-slate-700 rounded-lg text-white">
        </div>
        <div>
            <label for="wash-type" class="block mb-1">Tipo de Lavagem</label>
            <select id="wash-type" name="wash-type" required class="w-full px-4 py-3 bg-slate-700 rounded-lg text-white">
                <option value="" disabled selected>Selecione um pacote</option>
                <option value="Brilho Express">Brilho Express</option>
                <option value="Detalhe Premium">Detalhe Premium</option>
                <option value="Proteção Total">Proteção Total</option>
            </select>
        </div>
        <div>
            <label for="appointment-date" class="block mb-1">Data Desejada</label>
            <input type="date" id="appointment-date" name="appointment-date" required class="w-full px-4 py-3 bg-slate-700 rounded-lg text-white">
        </div>
        <button type="submit" class="w-full bg-blue-600 py-3 rounded-lg hover:bg-blue-700 transition">Confirmar Agendamento</button>
    </form>
</div>

<div id="success-container" class="hidden text-center mt-6">
    <h2 class="text-green-400 font-bold text-xl">Agendamento Confirmado!</h2>
    <a href="index.html" class="text-blue-400 mt-4 block">Voltar</a>
</div>

<script>
const form = document.getElementById("appointment-form");
const successContainer = document.getElementById("success-container");
const appointmentDetails = document.getElementById("appointment-details");
const newAppointmentBtn = document.getElementById("new-appointment-btn");

const API_URL = "https://fourfun-agendamentos-h9v3.onrender.com"; // seu backend online

// Função para enviar agendamento
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    nome_cliente: document.getElementById("name").value,
    modelo_carro: document.getElementById("car-model").value,
    tipo_lavagem: document.getElementById("wash-type").value,
    data_agendada: document.getElementById("appointment-date").value
  };

  try {
    const res = await fetch(`${API_URL}/agendamentos`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    if (!res.ok) throw new Error("Erro ao enviar agendamento");

    // Mostrar mensagem de sucesso
    form.style.display = "none";
    appointmentDetails.innerHTML = `
      <p><strong>Nome:</strong> ${data.nome_cliente}</p>
      <p><strong>Carro:</strong> ${data.modelo_carro}</p>
      <p><strong>Tipo de lavagem:</strong> ${data.tipo_lavagem}</p>
      <p><strong>Data agendada:</strong> ${data.data_agendada}</p>
    `;
    successContainer.classList.remove("hidden");

    // Atualizar lista de agendamentos (opcional)
    fetchAppointments();

  } catch (err) {
    alert(err.message);
  }
});

// Botão para novo agendamento
newAppointmentBtn.addEventListener("click", () => {
  form.reset();
  form.style.display = "block";
  successContainer.classList.add("hidden");
});

// Função para listar todos os agendamentos
async function fetchAppointments() {
  try {
    const res = await fetch(`${API_URL}/agendamentos`);
    const appointments = await res.json();

    console.log("Agendamentos:", appointments);
    // Aqui você pode criar um elemento HTML para listar na página se quiser
  } catch (err) {
    console.error("Erro ao buscar agendamentos:", err);
  }
}

// Chamada inicial para atualizar lista
fetchAppointments();


</script>
</main>
</body>
</html>
