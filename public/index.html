<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4Fun - Agendamento</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

  <main class="w-full max-w-lg">
    <!-- Formulário -->
    <div id="form-container" class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
      <header class="text-center mb-8">
        <h1 class="text-3xl font-bold text-blue-400">4Fun Estética Automotiva</h1>
        <p class="text-slate-400 mt-2">Deixe seu carro com cara de novo. Agende seu serviço.</p>
      </header>

      <form id="appointment-form" class="space-y-6">
        <div>
          <label for="name" class="block text-sm font-medium text-slate-300 mb-2">Seu Nome</label>
          <input type="text" id="name" name="name" required
                 class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-150"
                 placeholder="João Silva">
        </div>

        <div>
          <label for="car-model" class="block text-sm font-medium text-slate-300 mb-2">Modelo do Carro</label>
          <input type="text" id="car-model" name="car-model" required
                 class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-150"
                 placeholder="Honda Civic 2022">
        </div>

        <div>
          <label for="wash-type" class="block text-sm font-medium text-slate-300 mb-2">Tipo de Lavagem</label>
          <select id="wash-type" name="wash-type" required
                  class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-150">
            <option value="" disabled selected>Selecione um pacote</option>
            <option value="LAVAGEM EXTERNA (SIMPLES)">LAVAGEM EXTERNA (SIMPLES)</option>
            <option value="LAVAGEM EXTERNA (DETALHADA)">LAVAGEM EXTERNA (DETALHADA)</option>
            <option value="LIMPEZA INTERNA (TECIDO)">LIMPEZA INTERNA (TECIDO)</option>
            <option value="LIMPEZA INTERNA (COURO)">LIMPEZA INTERNA (COURO)</option>
            <option value="LIMPEZA INTERNA E LAVAGEM EXTERNA">LIMPEZA INTERNA E LAVAGEM EXTERNA</option>
            <option value="POLIMENTO">POLIMENTO</option>
          </select>
        </div>

        <div>
          <label for="appointment-date" class="block text-sm font-medium text-slate-300 mb-2">Data Desejada</label>
          <input type="date" id="appointment-date" name="appointment-date" required
                 class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-150">
        </div>

        <button type="submit"
                class="w-full bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-150 ease-in-out">
          Confirmar Agendamento
        </button>
      </form>
    </div>

    <!-- Mensagem de sucesso -->
    <div id="success-container" class="hidden bg-green-900/20 border border-green-500 p-8 rounded-2xl shadow-2xl text-center fade-in mt-6">
      <svg class="w-16 h-16 mx-auto text-green-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <h2 class="text-2xl font-bold text-green-400 mb-4">Agendamento Confirmado!</h2>
      <div id="appointment-details" class="text-left bg-slate-800/50 p-4 rounded-lg mb-6 text-slate-300"></div>
      <button id="new-appointment-btn" class="bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg hover:bg-blue-700 transition duration-150">
        Fazer Novo Agendamento
      </button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
