<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Carro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen p-4">
  <main class="bg-slate-800 p-8 rounded-2xl shadow-lg w-full max-w-lg">
    <h1 class="text-2xl font-bold text-blue-400 mb-4 text-center">Cadastro de Carro</h1>

    <form id="formCarro" class="space-y-4">
      <input type="text" id="placa" placeholder="Placa (ABC1D23)" required
        class="w-full px-4 py-3 rounded bg-slate-700 border border-slate-600">
      <input type="text" id="marca" placeholder="Marca" required
        class="w-full px-4 py-3 rounded bg-slate-700 border border-slate-600">
      <input type="text" id="modelo" placeholder="Modelo" required
        class="w-full px-4 py-3 rounded bg-slate-700 border border-slate-600">
      <input type="text" id="ano" placeholder="Ano (YYYY)" required
        class="w-full px-4 py-3 rounded bg-slate-700 border border-slate-600">
      <input type="text" id="cor" placeholder="Cor" required
        class="w-full px-4 py-3 rounded bg-slate-700 border border-slate-600">

      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-semibold">
        Cadastrar Carro
      </button>
    </form>

    <div id="success" class="hidden text-green-400 mt-4 text-center">
      ✅ Carro cadastrado com sucesso!
    </div>
    <div class="text-center mt-4">
      <a href="/agendar" class="text-blue-400 hover:underline">Voltar para Agendamento</a>
    </div>
  </main>

  <script>
    const form = document.getElementById("formCarro");
    const success = document.getElementById("success");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const placa = document.getElementById("placa").value.toUpperCase().trim();
      const marca = document.getElementById("marca").value.trim();
      const modelo = document.getElementById("modelo").value.trim();
      const ano = document.getElementById("ano").value.trim();
      const cor = document.getElementById("cor").value.trim();

      // Validação simples
      if (!/^[A-Z]{3}[0-9][A-Z0-9][0-9]{2}$/.test(placa)) {
        alert("Placa inválida! Use o formato ABC1D23.");
        return;
      }
      if (!marca || !modelo || !ano || !cor) {
        alert("Todos os campos devem ser preenchidos.");
        return;
      }

      const data = { placa, marca, modelo, ano, cor };

      try {
        const res = await fetch("/api/carro", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        // Mostra mensagem específica para duplicidade
        if (!res.ok) {
          if (result.error === "Carro já cadastrado") {
            alert("❌ " + result.error);
          } else {
            throw new Error(result.error || "Erro ao cadastrar carro");
          }
          return;
        }

        success.classList.remove("hidden");
        form.reset();
      } catch (err) {
        alert("Erro ao cadastrar carro: " + err.message);
      }
    });
  </script>
</body>
</html>
