<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4Fun - Cadastro de Carro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

  <main class="w-full max-w-lg bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
    <header class="text-center mb-8">
      <h1 class="text-3xl font-bold text-blue-400">Cadastro de Carro</h1>
      <p class="text-slate-400 mt-2">Preencha as informações abaixo para cadastrar seu veículo.</p>
    </header>

    <form id="car-form" class="space-y-5">
      <div>
        <label for="placa" class="block text-sm font-medium text-slate-300 mb-2">Placa</label>
        <input type="text" id="placa" name="placa" required
          placeholder="ABC1D23"
          class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="marca" class="block text-sm font-medium text-slate-300 mb-2">Marca</label>
        <input type="text" id="marca" name="marca" required
          placeholder="Toyota"
          class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="modelo" class="block text-sm font-medium text-slate-300 mb-2">Modelo</label>
        <input type="text" id="modelo" name="modelo" required
          placeholder="Corolla XEi 2.0"
          class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="ano" class="block text-sm font-medium text-slate-300 mb-2">Ano</label>
        <input type="text" id="ano" name="ano" required
          placeholder="2020"
          class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="cor" class="block text-sm font-medium text-slate-300 mb-2">Cor</label>
        <input type="text" id="cor" name="cor" required
          placeholder="Prata"
          class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-150">
        Cadastrar Carro
      </button>
    </form>

    <div id="success" class="hidden text-center mt-6 text-green-400 font-semibold">
      ✅ Carro cadastrado com sucesso!
    </div>

    <div class="text-center mt-6">
      <a href="/agendar" class="text-blue-400 hover:underline">Voltar para Agendamento</a>
    </div>
  </main>

  <script>
    const form = document.getElementById("car-form");
    const success = document.getElementById("success");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        placa: form.placa.value,
        marca: form.marca.value,
        modelo: form.modelo.value,
        ano: form.ano.value,
        cor: form.cor.value
      };

      try {
        const res = await fetch("/api/carro", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (!res.ok) throw new Error("Erro ao cadastrar carro");

        success.classList.remove("hidden");
        form.reset();
      } catch (err) {
        alert("Erro ao cadastrar carro: " + err.message);
      }
    });
  </script>

</body>
</html>
