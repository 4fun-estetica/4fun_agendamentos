<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Carro - 4Fun</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

  <main class="w-full max-w-lg bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
    <header class="text-center mb-8">
      <h1 class="text-3xl font-bold text-blue-400">Cadastro de Carro</h1>
      <p class="text-slate-400 mt-2">Registre um veículo para facilitar o agendamento</p>
    </header>

    <form id="car-form" class="space-y-6">
      <div>
        <label for="placa" class="block text-sm font-medium mb-2">Placa</label>
        <input type="text" id="placa" name="placa" maxlength="8" required
          class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 uppercase">
      </div>

      <div>
        <label for="marca" class="block text-sm font-medium mb-2">Marca</label>
        <input type="text" id="marca" name="marca" required
          class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="modelo" class="block text-sm font-medium mb-2">Modelo</label>
        <input type="text" id="modelo" name="modelo" required
          class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="ano" class="block text-sm font-medium mb-2">Ano</label>
        <input type="text" id="ano" name="ano" required
          class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="cor" class="block text-sm font-medium mb-2">Cor</label>
        <input type="text" id="cor" name="cor"
          class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="nome_cliente" class="block text-sm font-medium mb-2">Nome do Cliente</label>
        <input type="text" id="nome_cliente" name="nome_cliente"
          class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>

      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition">
        Cadastrar Carro
      </button>
    </form>

    <div id="success-message" class="hidden mt-6 text-center text-green-400 font-semibold">
      ✅ Carro cadastrado com sucesso!
    </div>

    <div class="mt-6 text-center">
      <a href="/agendar" class="text-blue-400 hover:underline">← Voltar para Agendamento</a>
    </div>
  </main>

  <script>
    const form = document.getElementById("car-form");
    const successMessage = document.getElementById("success-message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        placa: form.placa.value.toUpperCase(),
        marca: form.marca.value,
        modelo: form.modelo.value,
        ano: form.ano.value,
        cor: form.cor.value,
        nome_cliente: form.nome_cliente.value
      };

      try {
        const res = await fetch("/api/carro", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        const resData = await res.json();
        if (!res.ok) throw new Error(resData.error || "Erro ao cadastrar carro");

        successMessage.classList.remove("hidden");
        form.reset();
      } catch (err) {
        alert(err.message);
      }
    });
  </script>

</body>
</html>
