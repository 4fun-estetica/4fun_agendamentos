<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Agendamentos</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4 sm:p-8">

<h1 class="text-2xl sm:text-3xl text-blue-400 mb-6 text-center sm:text-left">Agendamentos</h1>

<!-- Container responsivo -->
<div class="overflow-x-auto">
<table class="min-w-full bg-slate-800 rounded-lg border border-slate-700">
<thead class="bg-slate-700 text-blue-400">
<tr>
<th class="px-2 sm:px-4 py-2">ID</th>
<th class="px-2 sm:px-4 py-2">Nome</th>
<th class="px-2 sm:px-4 py-2">Carro</th>
<th class="px-2 sm:px-4 py-2">Tipo</th>
<th class="px-2 sm:px-4 py-2">Data</th>
<th class="px-2 sm:px-4 py-2">Registrado em</th>
<th class="px-2 sm:px-4 py-2">Ações</th>
<th class="px-2 sm:px-4 py-2">Status</th>
</tr>
</thead>
<tbody id="tabela" class="text-slate-300"></tbody>
</table>
</div>

<!-- Modal para edição -->
<div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
  <div class="bg-slate-800 p-6 rounded-xl w-11/12 sm:w-96 relative">
    <h2 class="text-xl font-bold mb-4 text-blue-400">Editar Agendamento</h2>
    <form id="edit-form" class="space-y-4">
      <input type="text" id="edit-name" placeholder="Nome" class="w-full px-3 py-2 rounded bg-slate-700 text-white">
      <input type="text" id="edit-car" placeholder="Carro" class="w-full px-3 py-2 rounded bg-slate-700 text-white">
      <select id="edit-type" class="w-full px-3 py-2 rounded bg-slate-700 text-white">
        <option value="">Selecione tipo de lavagem</option>
        <option value="LAVAGEM EXTERNA (SIMPLES)">LAVAGEM EXTERNA (SIMPLES)</option>
        <option value="LAVAGEM EXTERNA (DETALHADA)">LAVAGEM EXTERNA (DETALHADA)</option>
        <option value="LIMPEZA INTERNA (TECIDO)">LIMPEZA INTERNA (TECIDO)</option>
        <option value="LIMPEZA INTERNA (COURO)">LIMPEZA INTERNA (COURO)</option>
        <option value="LIMPEZA INTERNA E LAVAGEM EXTERNA">LIMPEZA INTERNA E LAVAGEM EXTERNA</option>
        <option value="POLIMENTO">POLIMENTO</option>
      </select>
      <input type="date" id="edit-date-only" class="w-full px-3 py-2 rounded bg-slate-700 text-white">
      <select id="edit-hour" class="w-full px-3 py-2 rounded bg-slate-700 text-white"></select>
      <div class="flex justify-end gap-2">
        <button type="button" id="cancel-edit" class="px-4 py-2 bg-red-600 rounded hover:bg-red-700">Cancelar</button>
        <button type="submit" class="px-4 py-2 bg-blue-600 rounded hover:bg-blue-700">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script>
const tabela = document.getElementById('tabela');
const API_URL = "https://fourfun-agendamentos-h9v3.onrender.com";

let agendamentosLista = [];

// ====== Formatar datas corretamente ======
function formatarDataBR(dataString) {
    if (!dataString) return '';
    const data = new Date(dataString.replace(' ', 'T'));
    if (isNaN(data)) return '';
    const opcoes = { timeZone: 'America/Sao_Paulo', day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' };
    return new Intl.DateTimeFormat('pt-BR', opcoes).format(data);
}

function paraDatetimeLocal(dataString) {
    if (!dataString) return '';
    const data = new Date(dataString.replace(' ', 'T'));
    if (isNaN(data)) return '';
    const ano = data.getFullYear();
    const mes = String(data.getMonth()+1).padStart(2,'0');
    const dia = String(data.getDate()).padStart(2,'0');
    const hora = String(data.getHours()).padStart(2,'0');
    const min = String(data.getMinutes()).padStart(2,'0');
    return `${ano}-${mes}-${dia}T${hora}:${min}`;
}

async function atualizarStatus(id, status){
    const res = await fetch(`${API_URL}/api/agendar/${id}/status`,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({status})
    });
    if(!res.ok) throw new Error("Erro ao atualizar status");
}

// ====== Carregar agendamentos ======
async function carregarAgendamentos(){
    try{
        const res = await fetch(`${API_URL}/api/listar`);
        const lista = await res.json();
        agendamentosLista = lista;
        tabela.innerHTML = "";

        lista.forEach((a,i)=>{
            const tr = document.createElement('tr');
            tr.className = i%2===0 ? "bg-slate-800/80":"bg-slate-800";

            const dataFormatada = formatarDataBR(a.appointmentDate || a.data_agendada);
            const registradoFormatado = formatarDataBR(a.createdAt || a.data_registro);
            const statusAtual = a.status || "Pendente";

            tr.innerHTML = `
                <td class="px-2 sm:px-4 py-2">${a.id}</td>
                <td class="px-2 sm:px-4 py-2">${a.name||a.nome_cliente}</td>
                <td class="px-2 sm:px-4 py-2">${a.carModel||a.modelo_carro}</td>
                <td class="px-2 sm:px-4 py-2">${a.washType||a.tipo_lavagem}</td>
                <td class="px-2 sm:px-4 py-2">${dataFormatada}</td>
                <td class="px-2 sm:px-4 py-2">${registradoFormatado}</td>
                <td class="px-2 sm:px-4 py-2 flex gap-1 flex-wrap"></td>
                <td class="status px-2 sm:px-4 py-2">${statusAtual}</td>
            `;
            tabela.prepend(tr);

            const tdAcoes = tr.children[6];

            if(statusAtual==="Feito") tr.style.backgroundColor="#064e3b";
            else if(statusAtual==="Cancelado") tr.style.backgroundColor="#78350f";

            if(statusAtual==="Pendente"){
                const btnFeito = document.createElement('button');
                btnFeito.className="feito bg-green-600 px-2 py-1 rounded text-white hover:bg-green-700 text-xs sm:text-sm";
                btnFeito.textContent="Feito";
                tdAcoes.appendChild(btnFeito);

                const btnCancelar = document.createElement('button');
                btnCancelar.className="cancelar bg-yellow-600 px-2 py-1 rounded text-white hover:bg-yellow-700 text-xs sm:text-sm";
                btnCancelar.textContent="Cancelar";
                tdAcoes.appendChild(btnCancelar);

                const btnEditar = document.createElement('button');
                btnEditar.className="editar bg-blue-600 px-2 py-1 rounded text-white hover:bg-blue-700 text-xs sm:text-sm";
                btnEditar.textContent="Editar";
                tdAcoes.appendChild(btnEditar);

                const btnExcluir = document.createElement('button');
                btnExcluir.className="excluir text-red-400 font-bold text-xs sm:text-sm";
                btnExcluir.textContent="X";
                tdAcoes.appendChild(btnExcluir);

                btnFeito.addEventListener('click', async ()=>{ try{ await atualizarStatus(a.id,"Feito"); carregarAgendamentos(); } catch(err){ alert(err.message);} });
                btnCancelar.addEventListener('click', async ()=>{ try{ await atualizarStatus(a.id,"Cancelado"); carregarAgendamentos(); } catch(err){ alert(err.message);} });

                const modal=document.getElementById('modal');
                const editForm=document.getElementById('edit-form');
                const editName=document.getElementById('edit-name');
                const editCar=document.getElementById('edit-car');
                const editType=document.getElementById('edit-type');
                const editDateOnly=document.getElementById('edit-date-only');
                const editHour=document.getElementById('edit-hour');
                const cancelEdit=document.getElementById('cancel-edit');

                btnEditar.addEventListener('click', ()=>{
                    editName.value=a.name||a.nome_cliente;
                    editCar.value=a.carModel||a.modelo_carro;
                    editType.value=a.washType||a.tipo_lavagem;
                    const dt = new Date(a.appointmentDate||a.data_agendada);
                    editDateOnly.value=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;

                    // ===== Preencher horários disponíveis =====
                    editHour.innerHTML="";
                    const todosHorarios = ["08:00","10:00","12:00","14:00","16:00","18:00"];
                    const dataSelecionada = editDateOnly.value;

                    const horariosOcupados = agendamentosLista
                        .filter(b=>b.id!==a.id && b.appointmentDate?.startsWith(dataSelecionada))
                        .map(b=>b.appointmentDate.substring(11,16));

                    todosHorarios.forEach(h=>{
                        const opt=document.createElement('option');
                        opt.value=h;
                        opt.textContent=h;
                        if(horariosOcupados.includes(h)) { opt.disabled=true; opt.textContent=h+" (ocupado)"; }
                        if(a.appointmentDate?.substring(11,16)===h) opt.selected=true;
                        editHour.appendChild(opt);
                    });

                    modal.classList.remove('hidden');
                });

                editDateOnly.addEventListener('change', ()=>{
                    const dataSelecionada = editDateOnly.value;
                    editHour.innerHTML="";
                    const todosHorarios = ["08:00","10:00","12:00","14:00","16:00","18:00"];
                    const horariosOcupados = agendamentosLista
                        .filter(b=>b.id!==a.id && b.appointmentDate?.startsWith(dataSelecionada))
                        .map(b=>b.appointmentDate.substring(11,16));
                    todosHorarios.forEach(h=>{
                        const opt=document.createElement('option');
                        opt.value=h;
                        opt.textContent=h;
                        if(horariosOcupados.includes(h)) { opt.disabled=true; opt.textContent=h+" (ocupado)"; }
                        editHour.appendChild(opt);
                    });
                });

                editForm.onsubmit=async e=>{
                    e.preventDefault();
                    const novaData = editDateOnly.value + " " + editHour.value + ":00";
                    try{
                        const res = await fetch(`${API_URL}/api/agendar/${a.id}`,{
                            method:"PUT",
                            headers:{"Content-Type":"application/json"},
                            body:JSON.stringify({
                                name:editName.value,
                                carModel:editCar.value,
                                washType:editType.value,
                                appointmentDate:novaData
                            })
                        });
                        if(!res.ok) throw new Error("Erro ao atualizar registro");
                        modal.classList.add('hidden');
                        carregarAgendamentos();
                    }catch(err){ alert(err.message); }
                };

                cancelEdit.addEventListener('click', ()=>modal.classList.add('hidden'));

                btnExcluir.addEventListener('click', async ()=>{
                    if(!confirm("Deseja realmente excluir este agendamento?")) return;
                    try{
                        const res = await fetch(`${API_URL}/api/agendar/${a.id}`,{method:"DELETE"});
                        if(!res.ok) throw new Error("Erro ao excluir registro");
                        carregarAgendamentos();
                    }catch(err){ alert(err.message); }
                });
            }
        });
    }catch(error){ console.error("Erro ao carregar agendamentos:",error); }
}

carregarAgendamentos();
</script>
</body>
</html>
