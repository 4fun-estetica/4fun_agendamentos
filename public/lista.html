<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Agendamentos</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">
<h1 class="text-3xl text-blue-400 mb-6">Agendamentos</h1>

<table class="min-w-full bg-slate-800 rounded-lg">
<thead class="bg-slate-700 text-blue-400">
<tr>
<th class="px-4 py-2">ID</th>
<th class="px-4 py-2">Nome</th>
<th class="px-4 py-2">Carro</th>
<th class="px-4 py-2">Tipo</th>
<th class="px-4 py-2">Data</th>
<th class="px-4 py-2">Registrado em</th>
<th class="px-4 py-2">Ações</th>
</tr>
</thead>
<tbody id="tabela" class="text-slate-300"></tbody>
</table>

<script>
const tabela = document.getElementById('tabela');
const API_URL = "https://fourfun-agendamentos-h9v3.onrender.com";

// Função para formatar datas no padrão DD-MM-YYYY HH:mm
function formatarData(dataString) {
    const data = new Date(dataString);
    const dia = String(data.getDate()).padStart(2, '0');
    const mes = String(data.getMonth() + 1).padStart(2, '0');
    const ano = data.getFullYear();
    const hora = String(data.getHours()).padStart(2, '0');
    const minuto = String(data.getMinutes()).padStart(2, '0');
    return `${dia}-${mes}-${ano} ${hora}:${minuto}`;
}

// Função para carregar todos os agendamentos
async function carregarAgendamentos() {
    try {
        const res = await fetch(`${API_URL}/api/listar`);
        const lista = await res.json();

        tabela.innerHTML = ""; // Limpa a tabela

        lista.forEach(a => {
            const tr = document.createElement('tr');

            const dataFormatada = formatarData(a.data_agendada);
            const registradoFormatado = formatarData(a.data_registro);

            tr.innerHTML = `
                <td class="px-4 py-2">${a.id}</td>
                <td class="px-4 py-2">${a.nome_cliente}</td>
                <td class="px-4 py-2">${a.modelo_carro}</td>
                <td class="px-4 py-2">${a.tipo_lavagem}</td>
                <td class="px-4 py-2">${dataFormatada}</td>
                <td class="px-4 py-2">${registradoFormatado}</td>
                <td class="px-4 py-2">
                  <button class="bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded" onclick="excluirAgendamento(${a.id})">
                    Excluir
                  </button>
                </td>
            `;
            tabela.prepend(tr); // Adiciona do mais recente para o mais antigo
        });
    } catch (error) {
        console.error("Erro ao carregar agendamentos:", error);
    }
}

// Função para excluir um agendamento
async function excluirAgendamento(id) {
    if (!confirm("Deseja realmente excluir este agendamento?")) return;

    try {
        const res = await fetch(`${API_URL}/api/agendar/${id}`, {
            method: "DELETE"
        });

        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
            throw new Error("Resposta inesperada do servidor.");
        }

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Erro ao excluir agendamento");

        alert(data.message);
        carregarAgendamentos(); // Atualiza a tabela
    } catch (err) {
        alert(err.message);
    }
}

// Chama a função ao carregar a página
carregarAgendamentos();
</script>
</body>
</html>
