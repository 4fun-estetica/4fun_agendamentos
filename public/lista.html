<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Agendamentos</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">
<h1 class="text-3xl text-blue-400 mb-6">Agendamentos</h1>

<table class="min-w-full bg-slate-800 rounded-lg">
<thead class="bg-slate-700 text-blue-400">
<tr>
<th class="px-4 py-2">ID</th>
<th class="px-4 py-2">Nome</th>
<th class="px-4 py-2">Carro</th>
<th class="px-4 py-2">Tipo</th>
<th class="px-4 py-2">Data</th>
<th class="px-4 py-2">Registrado em</th>
<th class="px-4 py-2">Ações</th>
<th class="px-4 py-2">Status</th>
</tr>
</thead>
<tbody id="tabela" class="text-slate-300"></tbody>
</table>

<!-- Modal para edição -->
<div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
  <div class="bg-slate-800 p-6 rounded-xl w-96 relative">
    <h2 class="text-xl font-bold mb-4 text-blue-400">Editar Agendamento</h2>
    <form id="edit-form" class="space-y-4">
      <input type="text" id="edit-name" placeholder="Nome" class="w-full px-3 py-2 rounded bg-slate-700 text-white">
      <input type="text" id="edit-car" placeholder="Carro" class="w-full px-3 py-2 rounded bg-slate-700 text-white">
      <select id="edit-type" class="w-full px-3 py-2 rounded bg-slate-700 text-white">
        <option value="">Selecione tipo de lavagem</option>
        <option value="LAVAGEM EXTERNA (SIMPLES)">LAVAGEM EXTERNA (SIMPLES)</option>
        <option value="LAVAGEM EXTERNA (DETALHADA)">LAVAGEM EXTERNA (DETALHADA)</option>
        <option value="LIMPEZA INTERNA (TECIDO)">LIMPEZA INTERNA (TECIDO)</option>
        <option value="LIMPEZA INTERNA (COURO)">LIMPEZA INTERNA (COURO)</option>
        <option value="LIMPEZA INTERNA E LAVAGEM EXTERNA">LIMPEZA INTERNA E LAVAGEM EXTERNA</option>
        <option value="POLIMENTO">POLIMENTO</option>
      </select>
      <input type="datetime-local" id="edit-date" class="w-full px-3 py-2 rounded bg-slate-700 text-white">
      <div class="flex justify-end gap-2">
        <button type="button" id="cancel-edit" class="px-4 py-2 bg-red-600 rounded hover:bg-red-700">Cancelar</button>
        <button type="submit" class="px-4 py-2 bg-blue-600 rounded hover:bg-blue-700">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script>
const tabela = document.getElementById('tabela');
const API_URL = "https://fourfun-agendamentos-h9v3.onrender.com";

// Função para formatar datas no padrão DD-MM-YYYY HH:mm
function formatarData(dataString) {
    const data = new Date(dataString);
    const dia = String(data.getDate()).padStart(2, '0');
    const mes = String(data.getMonth() + 1).padStart(2, '0');
    const ano = data.getFullYear();
    const hora = String(data.getHours()).padStart(2, '0');
    const minuto = String(data.getMinutes()).padStart(2, '0');
    return `${dia}-${mes}-${ano} ${hora}:${minuto}`;
}

// Atualizar status via API
async function atualizarStatus(id, status) {
    const res = await fetch(`${API_URL}/api/agendar/${id}/status`, {
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({status})
    });
    if (!res.ok) throw new Error("Erro ao atualizar status");
}

// Carregar agendamentos
async function carregarAgendamentos() {
    try {
        const res = await fetch(`${API_URL}/api/listar`);
        const lista = await res.json();
        tabela.innerHTML = "";

        lista.forEach(a => {
            const tr = document.createElement('tr');
            const dataFormatada = formatarData(a.data_agendada);
            const registradoFormatado = formatarData(a.data_registro);
            const statusAtual = a.status || "Pendente";

            tr.innerHTML = `
                <td class="px-4 py-2">${a.id}</td>
                <td class="px-4 py-2">${a.nome_cliente}</td>
                <td class="px-4 py-2">${a.modelo_carro}</td>
                <td class="px-4 py-2">${a.tipo_lavagem}</td>
                <td class="px-4 py-2">${dataFormatada}</td>
                <td class="px-4 py-2">${registradoFormatado}</td>
                <td class="px-4 py-2 flex gap-1">
                  <button class="feito bg-green-600 px-2 py-1 rounded text-white hover:bg-green-700">Feito</button>
                  <button class="cancelar bg-yellow-600 px-2 py-1 rounded text-white hover:bg-yellow-700">Cancelar</button>
                  <button class="editar bg-blue-600 px-2 py-1 rounded text-white hover:bg-blue-700">Editar</button>
                  <button class="excluir text-red-400 font-bold">X</button>
                </td>
                <td class="status px-4 py-2">${statusAtual}</td>
            `;
            tabela.prepend(tr);

            const btnFeito = tr.querySelector('.feito');
            const btnCancelar = tr.querySelector('.cancelar');
            const btnEditar = tr.querySelector('.editar');
            const btnExcluir = tr.querySelector('.excluir');
            const tdStatus = tr.querySelector('.status');

            // Bloquear ações se status já definido
            if(statusAtual !== "Pendente"){
                tr.querySelectorAll('button').forEach(b => b.disabled = true);
            }

            btnFeito.addEventListener('click', async () => {
                try {
                    await atualizarStatus(a.id, "Feito");
                    tdStatus.textContent = "Serviço finalizado";
                    tr.querySelectorAll('button').forEach(b => b.disabled = true);
                    tr.style.backgroundColor = "#064e3b"; // verde escuro
                } catch(err) { alert(err.message); }
            });

            btnCancelar.addEventListener('click', async () => {
                try {
                    await atualizarStatus(a.id, "Cancelado");
                    tdStatus.textContent = "Serviço cancelado";
                    tr.querySelectorAll('button').forEach(b => b.disabled = true);
                    tr.style.backgroundColor = "#78350f"; // laranja escuro
                } catch(err) { alert(err.message); }
            });

            // Modal de edição
            const modal = document.getElementById('modal');
            const editForm = document.getElementById('edit-form');
            const editName = document.getElementById('edit-name');
            const editCar = document.getElementById('edit-car');
            const editType = document.getElementById('edit-type');
            const editDate = document.getElementById('edit-date');
            const cancelEdit = document.getElementById('cancel-edit');

            btnEditar.addEventListener('click', () => {
                editName.value = a.nome_cliente;
                editCar.value = a.modelo_carro;
                editType.value = a.tipo_lavagem;
                editDate.value = a.data_agendada.slice(0,16);
                modal.classList.remove('hidden');

                editForm.onsubmit = async (e) => {
                    e.preventDefault();
                    try {
                        const res = await fetch(`${API_URL}/api/agendar/${a.id}`, {
                            method: "PUT",
                            headers: {"Content-Type": "application/json"},
                            body: JSON.stringify({
                                name: editName.value,
                                carModel: editCar.value,
                                washType: editType.value,
                                appointmentDate: editDate.value
                            })
                        });
                        if (!res.ok) throw new Error("Erro ao atualizar registro");
                        modal.classList.add('hidden');
                        carregarAgendamentos();
                    } catch(err) { alert(err.message); }
                };
            });

            cancelEdit.addEventListener('click', () => modal.classList.add('hidden'));

            btnExcluir.addEventListener('click', async () => {
                if(!confirm("Deseja realmente excluir este agendamento?")) return;
                try {
                    const res = await fetch(`${API_URL}/api/agendar/${a.id}`, {method:"DELETE"});
                    if(!res.ok) throw new Error("Erro ao excluir registro");
                    carregarAgendamentos();
                } catch(err) { alert(err.message); }
            });
        });
    } catch (error) {
        console.error("Erro ao carregar agendamentos:", error);
    }
}

carregarAgendamentos();
</script>
</body>
</html>
