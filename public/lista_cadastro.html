<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Cadastros - 4Fun</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-4">

<main class="max-w-7xl mx-auto">

  <header class="text-center mb-8">
    <h1 class="text-3xl font-bold text-blue-400">Lista de Cadastros - 4Fun Estética Automotiva</h1>
    <p class="text-slate-400 mt-2">Visualize, edite ou exclua clientes e carros cadastrados</p>
  </header>

  <!-- Clientes -->
  <section class="mb-12">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-semibold text-blue-300">Clientes</h2>
      <a href="/cadastra_cliente.html" class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-700 transition">Novo Cliente</a>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left border border-slate-700">
        <thead class="bg-slate-800 text-slate-300">
          <tr>
            <th class="px-4 py-2 border-b border-slate-700">ID</th>
            <th class="px-4 py-2 border-b border-slate-700">Nome</th>
            <th class="px-4 py-2 border-b border-slate-700">Telefone</th>
            <th class="px-4 py-2 border-b border-slate-700">Endereço</th>
            <th class="px-4 py-2 border-b border-slate-700">Número</th>
            <th class="px-4 py-2 border-b border-slate-700">Complemento</th>
            <th class="px-4 py-2 border-b border-slate-700">Cidade</th>
            <th class="px-4 py-2 border-b border-slate-700">CEP</th>
            <th class="px-4 py-2 border-b border-slate-700">Ações</th>
          </tr>
        </thead>
        <tbody id="clientes-tbody" class="bg-slate-900"></tbody>
      </table>
    </div>
  </section>

  <!-- Carros -->
  <section>
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-semibold text-blue-300">Carros</h2>
      <a href="/cadastra_carro.html" class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-700 transition">Novo Carro</a>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left border border-slate-700">
        <thead class="bg-slate-800 text-slate-300">
          <tr>
            <th class="px-4 py-2 border-b border-slate-700">ID</th>
            <th class="px-4 py-2 border-b border-slate-700">Placa</th>
            <th class="px-4 py-2 border-b border-slate-700">Marca</th>
            <th class="px-4 py-2 border-b border-slate-700">Modelo</th>
            <th class="px-4 py-2 border-b border-slate-700">Ano</th>
            <th class="px-4 py-2 border-b border-slate-700">Cor</th>
            <th class="px-4 py-2 border-b border-slate-700">Cliente</th>
            <th class="px-4 py-2 border-b border-slate-700">Ações</th>
          </tr>
        </thead>
        <tbody id="carros-tbody" class="bg-slate-900"></tbody>
      </table>
    </div>
  </section>
</main>

<script>
let clientesLista = [];

// ===== Carregar clientes =====
async function carregarClientes() {
  try {
    const res = await fetch('/api/clientes');
    const clientes = await res.json();
    clientesLista = clientes;

    const tbody = document.getElementById('clientes-tbody');
    tbody.innerHTML = '';
    clientes.forEach(c => {
      const tr = document.createElement('tr');
      tr.dataset.original = JSON.stringify(c);

      tr.innerHTML = `
        <td class="px-4 py-2 border-b border-slate-700">${c.id_cliente}</td>
        <td class="px-4 py-2 border-b border-slate-700"><input value="${c.nome_cliente}" disabled class="w-full bg-slate-700 text-white px-2 py-1 rounded" data-field="nome_cliente"></td>
        <td class="px-4 py-2 border-b border-slate-700"><input value="${c.celular || ''}" disabled class="w-full bg-slate-700 text-white px-2 py-1 rounded" data-field="celular"></td>
        <td class="px-4 py-2 border-b border-slate-700"><input value="${c.logradouro || ''}" disabled class="w-full bg-slate-700 text-white px-2 py-1 rounded" data-field="logradouro"></td>
        <td class="px-4 py-2 border-b border-slate-700"><input value="${c.numero || ''}" disabled class="w-full bg-slate-700 text-white px-2 py-1 rounded" data-field="numero"></td>
        <td class="px-4 py-2 border-b border-slate-700"><input value="${c.complemento || ''}" disabled class="w-full bg-slate-700 text-white px-2 py-1 rounded" data-field="complemento"></td>
        <td class="px-4 py-2 border-b border-slate-700"><input value="${c.cidade || ''}" disabled class="w-full bg-slate-700 text-white px-2 py-1 rounded" data-field="cidade"></td>
        <td class="px-4 py-2 border-b border-slate-700"><input value="${c.cep || ''}" disabled class="w-full bg-slate-700 text-white px-2 py-1 rounded" data-field="cep"></td>
        <td class="px-4 py-2 border-b border-slate-700 flex gap-2">
          <button onclick="editarLinha(this)" class="bg-yellow-500 px-2 py-1 rounded hover:bg-yellow-600">Editar</button>
          <button onclick="salvarCliente(this, ${c.id_cliente})" disabled class="bg-green-600 px-2 py-1 rounded hover:bg-green-700">Salvar</button>
          <button onclick="cancelarEdicao(this)" disabled class="bg-gray-600 px-2 py-1 rounded hover:bg-gray-700">Cancelar</button>
          <button onclick="excluirCliente(${c.id_cliente})" class="bg-red-600 px-2 py-1 rounded hover:bg-red-700">Excluir</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
    return clientesLista;
  } catch (err) {
    console.error("Erro ao carregar clientes:", err);
    return [];
  }
}

// ===== Funções de edição =====
function editarLinha(btn) {
  const tr = btn.closest('tr');
  tr.querySelectorAll('input, select').forEach(input => input.disabled = false);
  tr.querySelector('button[onclick^="salvarCliente"], button[onclick^="salvarCarro"]').forEach?.(b => b.disabled = false);
  tr.querySelector('button[onclick^="salvarCliente"]')?.removeAttribute('disabled');
  tr.querySelector('button[onclick^="cancelarEdicao"]')?.removeAttribute('disabled');
  btn.disabled = true;
}

function cancelarEdicao(btn) {
  const tr = btn.closest('tr');
  const original = JSON.parse(tr.dataset.original);
  Object.keys(original).forEach(field => {
    const input = tr.querySelector(`[data-field="${field}"]`);
    if(input) input.value = original[field] || '';
  });
  tr.querySelectorAll('input, select').forEach(input => input.disabled = true);
  tr.querySelector('button[onclick^="salvarCliente"]')?.setAttribute('disabled', true);
  tr.querySelector('button[onclick^="cancelarEdicao"]')?.setAttribute('disabled', true);
  tr.querySelector('button[onclick^="editarLinha"]')?.removeAttribute('disabled');
}

// ===== Salvar cliente inline =====
async function salvarCliente(btn, id) {
  const tr = btn.closest('tr');
  const inputs = tr.querySelectorAll('input');
  const data = {};
  inputs.forEach(input => data[input.dataset.field] = input.value || null);

  try {
    const res = await fetch(`/api/clientes/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (!res.ok) throw new Error(result.error || 'Erro ao salvar cliente');
    alert(result.message || 'Cliente atualizado com sucesso!');
    await carregarClientes();
    carregarCarros();
  } catch (err) {
    alert(err.message);
  }
}

// ===== Carregar carros =====
async function carregarCarros() {
  try {
    const res = await fetch('/api/carros');
    const carros = await res.json();
    const tbody = document.getElementById('carros-tbody');
    tbody.innerHTML = '';

    carros.forEach(c => {
      const tr = document.createElement('tr');
      tr.dataset.original = JSON.stringify(c);

      // Dropdown de clientes
      const selectClientes = document.createElement('select');
      selectClientes.className = "bg-slate-800 text-slate-300 px-2 py-1 rounded";
      selectClientes.disabled = true;
      const defaultOption = document.createElement('option');
      defaultOption.value = "";
      defaultOption.text = "- Nenhum -";
      selectClientes.appendChild(defaultOption);

      clientesLista.forEach(cli => {
        const option = document.createElement('option');
        option.value = cli.id_cliente;
        option.text = cli.nome_cliente;
        if (cli.id_cliente === c.id_cliente) option.selected = true;
        selectClientes.appendChild(option);
      });

      selectClientes.addEventListener('change', () => vincularCliente(c.id_carro, selectClientes.value));

      tr.innerHTML = `
        <td class="px-4 py-2 border-b border-slate-700">${c.id_carro}</td>
        <td class="px-4 py-2 border-b border-slate-700"><input value="${c.placa}" disabled class="w-full bg-slate-700 text-white px-2 py-1 rounded" data-field="placa"></td>
        <td class="px-4 py-2 border-b border-slate-700"><input value="${c.marca}" disabled class="w-full bg-slate-700 text-white px-2 py-1 rounded" data-field="marca"></td>
        <td class="px-4 py-2 border-b border-slate-700"><input value="${c.modelo}" disabled class="w-full bg-slate-700 text-white px-2 py-1 rounded" data-field="modelo"></td>
        <td class="px-4 py-2 border-b border-slate-700"><input value="${c.ano || ''}" disabled class="w-full bg-slate-700 text-white px-2 py-1 rounded" data-field="ano"></td>
        <td class="px-4 py-2 border-b border-slate-700"><input value="${c.cor || ''}" disabled class="w-full bg-slate-700 text-white px-2 py-1 rounded" data-field="cor"></td>
        <td class="px-4 py-2 border-b border-slate-700"></td>
        <td class="px-4 py-2 border-b border-slate-700 flex gap-2">
          <button onclick="editarLinha(this)" class="bg-yellow-500 px-2 py-1 rounded hover:bg-yellow-600">Editar</button>
          <button onclick="salvarCarro(this, ${c.id_carro})" disabled class="bg-green-600 px-2 py-1 rounded hover:bg-green-700">Salvar</button>
          <button onclick="cancelarEdicao(this)" disabled class="bg-gray-600 px-2 py-1 rounded hover:bg-gray-700">Cancelar</button>
          <button onclick="excluirCarro(${c.id_carro})" class="bg-red-600 px-2 py-1 rounded hover:bg-red-700">Excluir</button>
        </td>
      `;

      tr.children[6].appendChild(selectClientes);
      tbody.appendChild(tr);
    });
  } catch (err) {
    console.error("Erro ao carregar carros:", err);
  }
}

// ===== Salvar carro inline =====
async function salvarCarro(btn, id) {
  const tr = btn.closest('tr');
  const inputs = tr.querySelectorAll('input');
  const data = {};
  inputs.forEach(input => data[input.dataset.field] = input.value || null);

  try {
    const res = await fetch(`/api/carros/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (!res.ok) throw new Error(result.error || 'Erro ao salvar carro');
    alert(result.message || 'Carro atualizado com sucesso!');
    carregarCarros();
  } catch (err) {
    alert(err.message);
  }
}

// ===== Vincular cliente a carro =====
async function vincularCliente(idCarro, idCliente) {
  try {
    const res = await fetch(`/api/carros/${idCarro}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id_cliente: idCliente || null })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao vincular cliente');
    alert(data.message || 'Cliente vinculado ao carro!');
    carregarCarros();
  } catch (err) {
    alert(err.message);
  }
}

// ===== Exclusão =====
async function excluirCliente(id) {
  if (!confirm("Deseja realmente excluir este cliente?")) return;
  try {
    const res = await fetch(`/api/clientes/${id}`, { method: "DELETE" });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao excluir cliente');
    alert(data.message || 'Cliente excluído!');
    await carregarClientes();
    carregarCarros();
  } catch (err) {
    alert(err.message);
  }
}

async function excluirCarro(id) {
  if (!confirm("Deseja realmente excluir este carro?")) return;
  try {
    const res = await fetch(`/api/carros/${id}`, { method: "DELETE" });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao excluir carro');
    alert(data.message || 'Carro excluído!');
    carregarCarros();
  } catch (err) {
    alert(err.message);
  }
}

// ===== Inicialização =====
async function inicializar() {
  await carregarClientes();
  carregarCarros();
}

inicializar();
</script>

</body>
</html>
